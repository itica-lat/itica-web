services:
  web:
    image: ghcr.io/f-a-k-u/itica-web:latest
    ports:
      - "80:80"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: ghcr.io/f-a-k-u/itica-backend:latest
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      - mongodb
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mongodb:
    image: mongo:7.0
    container_name: itica_mongodb
    restart: always
    ports:
    command:
      - --bind_ip_all
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network

# Definición de volúmenes para persistencia
volumes:
  mongodb_data:
    driver: local

# Red personalizada para mejor comunicación
networks:
  app-network:
    driver: bridge