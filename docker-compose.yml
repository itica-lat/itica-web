services:
  web:
    image: ghcr.io/itica-lat/itica-web:latest
    ports:
      - "8080:80"
    restart: always
    command: ["npm", "run", "preview"]  # Para Vite production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - backend
    networks:
      - app-network
      - web-proxy
    environment:
      - FRONTEND_URL=${FRONTEND_URL}

  backend:
    image: ghcr.io/itica-lat/itica-backend:latest
    ports:
      - "${PORT}:3001"
    restart: always
    depends_on:
      - mongodb
    networks:
      - app-network
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASS=${MONGODB_PASS}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SECURE=${SMTP_SECURE}
      - EMAIL_FROM=${EMAIL_FROM}
      - INTERNAL_EMAIL=${INTERNAL_EMAIL}
      - SALES_EMAIL=${SALES_EMAIL}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - FRONTEND_URL=${FRONTEND_URL}
    entrypoint: ["/bin/sh", "-c", "until nc -z mongodb 27017; do echo 'Esperando a MongoDB...'; sleep 2; done; node index.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mongodb:
    image: mongo:7.0
    container_name: itica_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    command: --bind_ip_all
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASS}
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE}

volumes:
  mongodb_data:
    driver: local

networks:
  app-network:
    driver: bridge
  web-proxy:
    external: true