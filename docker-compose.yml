services:
  web:
    image: ghcr.io/itica-lat/itica-web:latest
    ports:
      - "8080:80"
    restart: always
    command: ["bunx", "serve", "-s", "dist", "-l", "80", "-n"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - web-proxy

networks:
  web-proxy:
    external: true
